# =============================================================================
# iris-common CI — self-validation for the universal templates + scripts.
# Eats its own dogfood : the same templates that consumers include from
# this repo also gate THIS repo's MRs.
#
# 11 hand-written shell scripts under bin/ (dev/ + ship/) are the main
# artefact ; shellcheck on them prevents a typo from shipping silently
# to every consumer (the @@KEEP_IRIS_PROD@@ sentinel pattern that the
# 2026-04-29 RPO run hit was exactly this class of bug).
# =============================================================================

# Per ~/.claude/CLAUDE.md "Use local runners, never rely on GitLab
# SaaS quota". Routes every job (including the included templates,
# unless they override their own tags:) to the macbook-local runner.
# The 2026-04-29 conv-commits job on this repo's first MR hit
# ci_quota_exceeded on SaaS shared runners — same fix as java + ui.
default:
  tags:
    - macbook-local

# Bump shellcheck severity from `error` (template default) to `warning`
# now that the local warning backlog is at zero (cleanup landed 2026-05-14).
# Catches new warnings before they accumulate. Consumer repos opt-in
# individually when their own warning backlog reaches zero.
variables:
  SHELLCHECK_SEVERITY: "warning"

include:
  - local: ci-templates/conventional-commits.yml
  - local: ci-templates/shellcheck.yml
  - local: ci-templates/auto-merge-dev-to-main.yml

stages:
  - validate
  - promote

# ── Self-test the conventional-commits + shellcheck templates by
#    including them as `local:` (since cross-project include from the
#    same project doesn't make sense). They re-declare the validate
#    stage and are gated by their own rules: blocks. ─────────────────────

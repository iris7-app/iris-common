# Conventional Commits CI template — included by all 3 iris repos.
# Validates merge-request-event commits (the lefthook hook catches local
# commits ; this is the second-line backstop in CI).
#
# Usage in consumer .gitlab-ci.yml :
#   include:
#     - project: 'iris-7/iris-service-shared'
#       ref: main
#       file: 'ci-templates/conventional-commits.yml'

conventional-commits:
  stage: validate
  image: alpine:3.20
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  before_script:
    - apk add --no-cache git grep
  script:
    - |
      # Validate every commit in the MR (not just the head).
      git fetch origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME" --depth=50
      base=$(git merge-base "origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME" HEAD)
      regex='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-zA-Z0-9._/-]+\))?!?: .{1,100}$'
      bad=0
      # Skip merge commits (parent count > 1) — auto-generated by GitLab on
      # MR merge, their default subject `Merge branch '...' into '...'` is
      # not Conventional Commits compliant and there's no way to control it.
      # Discovered 2026-05-09 on dev → main promote MRs.
      while IFS= read -r sha; do
        parents=$(git log -1 --format=%P "$sha" | wc -w)
        if [ "$parents" -gt 1 ]; then
          continue
        fi
        msg=$(git log -1 --format=%s "$sha")
        if ! echo "$msg" | grep -qE "$regex"; then
          echo "❌ $sha: $msg"
          bad=$((bad + 1))
        fi
      done < <(git log --format=%H "$base..HEAD")
      if [ $bad -gt 0 ]; then
        echo "$bad commit(s) violate Conventional Commits."
        exit 1
      fi
      echo "✅ All commits in this MR follow Conventional Commits."

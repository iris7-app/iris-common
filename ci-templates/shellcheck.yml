# Shellcheck CI template — included by every iris repo with bash scripts.
# Catches bash bugs at MR time so a typo in `bin/cluster/demo/up.sh` (the
# 2026-04-29 RPO run hit one such) doesn't ship to main.
#
# Usage in consumer .gitlab-ci.yml :
#   include:
#     - project: 'iris-7/iris-common'
#       ref: main
#       file: 'ci-templates/shellcheck.yml'
#
# Override the default scan path by setting SHELLCHECK_PATH before the
# include (e.g. only `bin/dev` if you want to scope down) — the default
# `bin/**/*.sh` covers everything under bin/ recursively.
#
# This is a hard gate (no allow_failure) — if shellcheck fails, the
# pipeline fails. Per CLAUDE.md "Surgical fixes not allow_failure".

variables:
  SHELLCHECK_PATH: "bin"
  # Severity floor that gates the pipeline. Default `error` because
  # warnings are advisory (unused variables, eval-array, …) and pre-
  # existing-warning backlogs in the consumer repos shouldn't block
  # MRs unrelated to those scripts. Override to `warning` once your
  # repo's warning backlog is at zero to enforce a stricter floor.
  SHELLCHECK_SEVERITY: "error"
  # shellcheck-alpine v0.10.0 crashes on stdout writes when scripts contain
  # multi-byte UTF-8 chars (em-dash —, smart quotes, etc.) without a UTF-8
  # locale set — error surfaces as `<stdout>: commitBuffer: invalid argument
  # (invalid character)`. Forcing LC_ALL/LANG to C.UTF-8 lets the Haskell
  # runtime encode UTF-8 in its output stream. Discovered 2026-05-09 on
  # iris-service-java !275 (em-dashes in bin/run/_preamble.sh comments).
  LC_ALL: "C.UTF-8"
  LANG: "C.UTF-8"

shellcheck:
  stage: validate
  image: koalaman/shellcheck-alpine:v0.10.0
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "**/*.sh"
        - .gitlab-ci.yml
        - "ci-templates/**/*.yml"   # Self-trigger when the template itself changes (iris-common eats its own dogfood)
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - "**/*.sh"
        - .gitlab-ci.yml
        - "ci-templates/**/*.yml"   # Same — main pushes that touch templates also trigger
  script:
    - |
      if [ ! -d "$SHELLCHECK_PATH" ]; then
        echo "ℹ️  $SHELLCHECK_PATH does not exist ; skipping (no shell scripts to check)"
        exit 0
      fi
      # Show ALL findings (info+) for visibility, but only fail on
      # severity >= $SHELLCHECK_SEVERITY. The full list still appears
      # in the job log so reviewers can decide whether to fix.
      # --format=gcc avoids a v0.10.0 bug where the default tty format
      # crashes on stdout writes when scripts contain multi-byte UTF-8
      # chars (em-dash —, smart quotes, etc.) — error surfaces as
      # `<stdout>: commitBuffer: invalid argument (cannot encode
      # character '\8212')`. The gcc format is plain ASCII (file:line:
      # col: severity: msg [SCxxxx]) so the encoding bug never fires.
      # Discovered 2026-05-09 — LC_ALL=C.UTF-8 alone wasn't enough
      # because shellcheck v0.10.0 has a hard-coded encoding bug, not a
      # locale issue.
      echo "▶ Visibility pass (severity=info, non-gating) :"
      find "$SHELLCHECK_PATH" -name '*.sh' -type f | xargs shellcheck --format=gcc --severity=info || true
      echo ""
      echo "▶ Gating pass (severity=$SHELLCHECK_SEVERITY) :"
      find "$SHELLCHECK_PATH" -name '*.sh' -type f | xargs shellcheck --format=gcc --severity="$SHELLCHECK_SEVERITY"
